<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>S6 Approach C: Hybrid (Category Sources + Subcategory Layers)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; }
  #panel { width: 320px; background: #1a1a2e; color: #eee; overflow-y: auto; padding: 12px; font-size: 13px; }
  #panel h2 { font-size: 15px; margin: 12px 0 6px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 4px; }
  #panel h2:first-child { margin-top: 0; }
  .toggle { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; }
  .toggle input { accent-color: #4dabf7; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .section-toggle { font-weight: bold; background: #2a2a4a; padding: 4px 8px; border-radius: 4px; margin: 2px 0; }
  .sub-section { font-weight: 600; background: #252545; padding: 3px 6px; border-radius: 3px; margin: 2px 0; }
  #perf { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #0f0; padding: 6px 14px; border-radius: 6px; font-family: monospace; font-size: 13px; z-index: 999; }
  #bench-btn { display: block; margin: 12px 0; padding: 8px; background: #4dabf7; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
  #bench-results { white-space: pre-wrap; font-family: monospace; font-size: 11px; background: #111; padding: 8px; border-radius: 4px; margin-top: 8px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>Approach C: Hybrid</h2>
  <p style="font-size:11px;color:#888;margin-bottom:8px;">Source per category. Separate style layers per subcategory. Filter per individual item within subcategory.</p>

  <button id="bench-btn" onclick="runBenchmark()">Run Benchmark</button>
  <div id="bench-results"></div>

  <div id="toggles"></div>
</div>
<div id="perf">FPS: --</div>

<script>
const MAP_CENTER = [-9.7400, 51.9975];
let map, devices, breadcrumbs, positions, markers, drawings;

// Visibility state
let hiddenDevices = new Set();
let hiddenMarkersByType = { ipp_lkp: new Set(), clue: new Set(), hazard: new Set(), casualty: new Set() };
let hiddenDrawingsByType = { search_area: new Set(), range_ring: new Set(), bearing_line: new Set(), search_sector: new Set() };
let categoryVisibility = { positions: true, breadcrumbs: true };

// FPS counter
let frameCount = 0, lastFpsTime = performance.now(), currentFps = 0;
function fpsLoop() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    document.getElementById('perf').textContent = `FPS: ${currentFps}`;
    frameCount = 0;
    lastFpsTime = now;
  }
  requestAnimationFrame(fpsLoop);
}
requestAnimationFrame(fpsLoop);

async function loadData() {
  const [devRes, posRes, bcRes, mkRes, drRes] = await Promise.all([
    fetch('data/devices.json').then(r => r.json()),
    fetch('data/positions.geojson').then(r => r.json()),
    fetch('data/breadcrumbs.geojson').then(r => r.json()),
    fetch('data/markers.geojson').then(r => r.json()),
    fetch('data/drawings.geojson').then(r => r.json()),
  ]);
  devices = devRes;
  positions = posRes;
  breadcrumbs = bcRes;
  markers = mkRes;
  drawings = drRes;
}

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        osm: {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '&copy; OpenStreetMap contributors'
        }
      },
      layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
    },
    center: MAP_CENTER,
    zoom: 12
  });

  map.on('load', () => {
    addSources();
    addLayers();
    buildPanel();
  });
}

function addSources() {
  // Source 1: Tracking (positions + breadcrumbs merged)
  const trackingFeatures = [...positions.features, ...breadcrumbs.features];
  map.addSource('tracking', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: trackingFeatures }
  });

  // Source 2: Markers
  map.addSource('markers', {
    type: 'geojson',
    data: markers
  });

  // Source 3: Drawings
  map.addSource('drawings', {
    type: 'geojson',
    data: drawings
  });
}

function addLayers() {
  // ── Tracking: 2 subcategory layers (positions, breadcrumbs) ──
  map.addLayer({
    id: 'breadcrumbs-layer',
    type: 'line',
    source: 'tracking',
    filter: ['==', '$type', 'LineString'],
    paint: {
      'line-color': ['get', 'color'],
      'line-width': 2,
      'line-opacity': 0.7
    }
  });

  map.addLayer({
    id: 'positions-layer',
    type: 'circle',
    source: 'tracking',
    filter: ['==', '$type', 'Point'],
    paint: {
      'circle-radius': 7,
      'circle-color': ['get', 'color'],
      'circle-stroke-width': 2,
      'circle-stroke-color': '#fff'
    }
  });

  // ── Markers: 4 subcategory layers ──
  const markerTypes = ['ipp_lkp', 'clue', 'hazard', 'casualty'];
  const markerColors = { ipp_lkp: '#FF0000', clue: '#FFD700', hazard: '#FF6600', casualty: '#FF00FF' };

  markerTypes.forEach(type => {
    map.addLayer({
      id: `markers-${type}`,
      type: 'circle',
      source: 'markers',
      filter: ['==', ['get', 'markerType'], type],
      paint: {
        'circle-radius': 9,
        'circle-color': ['get', 'color'],
        'circle-stroke-width': 2,
        'circle-stroke-color': '#000'
      }
    });
  });

  // ── Drawings: separate layer per drawing type ──
  // Search areas (polygon)
  map.addLayer({
    id: 'drawings-search-area-fill',
    type: 'fill',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'search_area'],
    paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.2 }
  });
  map.addLayer({
    id: 'drawings-search-area-line',
    type: 'line',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'search_area'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 2 }
  });

  // Range rings (polygon)
  map.addLayer({
    id: 'drawings-range-ring-fill',
    type: 'fill',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'range_ring'],
    paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.15 }
  });
  map.addLayer({
    id: 'drawings-range-ring-line',
    type: 'line',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'range_ring'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 1.5, 'line-dasharray': [4, 2] }
  });

  // Search sectors (polygon)
  map.addLayer({
    id: 'drawings-search-sector-fill',
    type: 'fill',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'search_sector'],
    paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.15 }
  });
  map.addLayer({
    id: 'drawings-search-sector-line',
    type: 'line',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'search_sector'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 2 }
  });

  // Bearing lines (linestring)
  map.addLayer({
    id: 'drawings-bearing-line',
    type: 'line',
    source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'bearing_line'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 3 }
  });
}

// ── Filter builders per subcategory layer ──

function applyTrackingFilters() {
  // Positions
  if (!categoryVisibility.positions) {
    map.setFilter('positions-layer', false);
  } else if (hiddenDevices.size === 0) {
    map.setFilter('positions-layer', ['==', '$type', 'Point']);
  } else {
    map.setFilter('positions-layer', [
      'all',
      ['==', '$type', 'Point'],
      ['!', ['in', ['get', 'deviceId'], ['literal', [...hiddenDevices]]]]
    ]);
  }

  // Breadcrumbs
  if (!categoryVisibility.breadcrumbs) {
    map.setFilter('breadcrumbs-layer', false);
  } else if (hiddenDevices.size === 0) {
    map.setFilter('breadcrumbs-layer', ['==', '$type', 'LineString']);
  } else {
    map.setFilter('breadcrumbs-layer', [
      'all',
      ['==', '$type', 'LineString'],
      ['!', ['in', ['get', 'deviceId'], ['literal', [...hiddenDevices]]]]
    ]);
  }
}

function applyMarkerFilters(type) {
  const hidden = hiddenMarkersByType[type];
  const layerId = `markers-${type}`;
  if (hidden.size === 0) {
    map.setFilter(layerId, ['==', ['get', 'markerType'], type]);
  } else {
    map.setFilter(layerId, [
      'all',
      ['==', ['get', 'markerType'], type],
      ['!', ['in', ['get', 'id'], ['literal', [...hidden]]]]
    ]);
  }
}

function applyDrawingFilters(drawingType) {
  const hidden = hiddenDrawingsByType[drawingType];
  const layerSuffix = drawingType.replace(/_/g, '-');

  // Determine which layers exist for this type
  const possibleLayers = [
    `drawings-${layerSuffix}-fill`,
    `drawings-${layerSuffix}-line`,
    `drawings-${layerSuffix}`
  ];

  possibleLayers.forEach(layerId => {
    if (!map.getLayer(layerId)) return;
    if (hidden.size === 0) {
      map.setFilter(layerId, ['==', ['get', 'drawingType'], drawingType]);
    } else {
      map.setFilter(layerId, [
        'all',
        ['==', ['get', 'drawingType'], drawingType],
        ['!', ['in', ['get', 'id'], ['literal', [...hidden]]]]
      ]);
    }
  });
}

function applyAllFilters() {
  applyTrackingFilters();
  ['ipp_lkp', 'clue', 'hazard', 'casualty'].forEach(t => applyMarkerFilters(t));
  ['search_area', 'range_ring', 'bearing_line', 'search_sector'].forEach(t => applyDrawingFilters(t));
}

// ── Toggle functions ──

function setDeviceVisible(deviceId, visible) {
  if (visible) hiddenDevices.delete(deviceId);
  else hiddenDevices.add(deviceId);
  applyTrackingFilters();
}

function setMarkerVisible(type, markerId, visible) {
  if (visible) hiddenMarkersByType[type].delete(markerId);
  else hiddenMarkersByType[type].add(markerId);
  applyMarkerFilters(type);
}

function setDrawingVisible(type, drawingId, visible) {
  if (visible) hiddenDrawingsByType[type].delete(drawingId);
  else hiddenDrawingsByType[type].add(drawingId);
  applyDrawingFilters(type);
}

function setCategoryVisible(category, visible) {
  if (category === 'devices') {
    if (visible) hiddenDevices.clear();
    else devices.forEach(d => hiddenDevices.add(d.deviceId));
    categoryVisibility.positions = visible;
    categoryVisibility.breadcrumbs = visible;
    applyTrackingFilters();
  } else if (category === 'breadcrumbs') {
    categoryVisibility.breadcrumbs = visible;
    applyTrackingFilters();
  } else if (category === 'positions') {
    categoryVisibility.positions = visible;
    applyTrackingFilters();
  } else if (category === 'markers') {
    ['ipp_lkp', 'clue', 'hazard', 'casualty'].forEach(type => {
      if (visible) hiddenMarkersByType[type].clear();
      else {
        markers.features.filter(f => f.properties.markerType === type)
          .forEach(f => hiddenMarkersByType[type].add(f.properties.id));
      }
      applyMarkerFilters(type);
    });
  } else if (category === 'drawings') {
    ['search_area', 'range_ring', 'bearing_line', 'search_sector'].forEach(type => {
      if (visible) hiddenDrawingsByType[type].clear();
      else {
        drawings.features.filter(f => f.properties.drawingType === type)
          .forEach(f => hiddenDrawingsByType[type].add(f.properties.id));
      }
      applyDrawingFilters(type);
    });
  }
}

function setMarkerTypeVisible(type, visible) {
  if (visible) hiddenMarkersByType[type].clear();
  else {
    markers.features.filter(f => f.properties.markerType === type)
      .forEach(f => hiddenMarkersByType[type].add(f.properties.id));
  }
  applyMarkerFilters(type);
}

function setDrawingTypeVisible(type, visible) {
  if (visible) hiddenDrawingsByType[type].clear();
  else {
    drawings.features.filter(f => f.properties.drawingType === type)
      .forEach(f => hiddenDrawingsByType[type].add(f.properties.id));
  }
  applyDrawingFilters(type);
}

function buildPanel() {
  const panel = document.getElementById('toggles');
  let html = '';

  // Devices
  html += '<h2>People (30 devices)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('devices', this.checked)"> All Devices</label>`;
  devices.forEach(d => {
    html += `<label class="toggle"><input type="checkbox" checked onchange="setDeviceVisible('${d.deviceId}', this.checked)"><span class="color-dot" style="background:${d.color}"></span>${d.name}</label>`;
  });

  html += '<h2>Breadcrumbs</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('breadcrumbs', this.checked)"> All Breadcrumbs</label>`;

  // Markers by type
  html += '<h2>Markers (15)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('markers', this.checked)"> All Markers</label>`;

  const markerTypes = { ipp_lkp: 'IPP/LKP', clue: 'Clues', hazard: 'Hazards', casualty: 'Casualties' };
  for (const [type, label] of Object.entries(markerTypes)) {
    const typeMarkers = markers.features.filter(f => f.properties.markerType === type);
    if (typeMarkers.length === 0) continue;
    html += `<label class="toggle sub-section"><input type="checkbox" checked onchange="setMarkerTypeVisible('${type}', this.checked)"> ${label} (${typeMarkers.length})</label>`;
    typeMarkers.forEach(f => {
      html += `<label class="toggle" style="padding-left:16px"><input type="checkbox" checked onchange="setMarkerVisible('${type}', '${f.properties.id}', this.checked)"><span class="color-dot" style="background:${f.properties.color}"></span>${f.properties.name}</label>`;
    });
  }

  // Drawings by type
  html += '<h2>Drawings (12)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('drawings', this.checked)"> All Drawings</label>`;

  const drawingTypes = { search_area: 'Search Areas', range_ring: 'Range Rings', bearing_line: 'Bearing Lines', search_sector: 'Search Sectors' };
  for (const [type, label] of Object.entries(drawingTypes)) {
    const typeDrawings = drawings.features.filter(f => f.properties.drawingType === type);
    if (typeDrawings.length === 0) continue;
    html += `<label class="toggle sub-section"><input type="checkbox" checked onchange="setDrawingTypeVisible('${type}', this.checked)"> ${label} (${typeDrawings.length})</label>`;
    typeDrawings.forEach(f => {
      html += `<label class="toggle" style="padding-left:16px"><input type="checkbox" checked onchange="setDrawingVisible('${type}', '${f.properties.id}', this.checked)"><span class="color-dot" style="background:${f.properties.color}"></span>${f.properties.name}</label>`;
    });
  }

  panel.innerHTML = html;
}

// ─── Benchmarking ─────────────────────────────────────────────────────

function measureFps(durationMs) {
  return new Promise(resolve => {
    let frames = 0;
    const start = performance.now();
    function tick() {
      frames++;
      if (performance.now() - start < durationMs) {
        requestAnimationFrame(tick);
      } else {
        resolve(Math.round(frames * 1000 / (performance.now() - start)));
      }
    }
    requestAnimationFrame(tick);
  });
}

function timeOperation(fn) {
  const start = performance.now();
  fn();
  map.triggerRepaint();
  return performance.now() - start;
}

async function runBenchmark() {
  const results = document.getElementById('bench-results');
  results.textContent = 'Running benchmark...\n';
  const btn = document.getElementById('bench-btn');
  btn.disabled = true;
  const trials = 5;

  // Reset all visibility
  setCategoryVisible('devices', true);
  setCategoryVisible('markers', true);
  setCategoryVisible('drawings', true);

  // 1. FPS
  results.textContent += '\n=== FPS (all data visible, panning) ===\n';
  const fpsResults = [];
  for (let t = 0; t < trials; t++) {
    map.panBy([50, 0], { duration: 0 });
    map.panBy([-50, 0], { duration: 0 });
    const fps = await measureFps(2000);
    fpsResults.push(fps);
    results.textContent += `  Trial ${t + 1}: ${fps} FPS\n`;
  }
  const fpsMean = fpsResults.reduce((a, b) => a + b) / trials;
  const fpsStd = Math.sqrt(fpsResults.reduce((s, v) => s + (v - fpsMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${fpsMean.toFixed(1)} ± ${fpsStd.toFixed(1)} FPS\n`;

  // 2. Toggle one device
  results.textContent += '\n=== Toggle single device ===\n';
  const toggleResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setDeviceVisible('device-001', false));
    const t2 = timeOperation(() => setDeviceVisible('device-001', true));
    toggleResults.push((t1 + t2) / 2);
    results.textContent += `  Trial ${t + 1}: ${((t1 + t2) / 2).toFixed(2)}ms\n`;
  }
  const togMean = toggleResults.reduce((a, b) => a + b) / trials;
  const togStd = Math.sqrt(toggleResults.reduce((s, v) => s + (v - togMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${togMean.toFixed(2)} ± ${togStd.toFixed(2)}ms\n`;

  // 3. Toggle category (all markers)
  results.textContent += '\n=== Toggle all markers ===\n';
  const catResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setCategoryVisible('markers', false));
    const t2 = timeOperation(() => setCategoryVisible('markers', true));
    catResults.push((t1 + t2) / 2);
    results.textContent += `  Trial ${t + 1}: ${((t1 + t2) / 2).toFixed(2)}ms\n`;
  }
  const catMean = catResults.reduce((a, b) => a + b) / trials;
  const catStd = Math.sqrt(catResults.reduce((s, v) => s + (v - catMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${catMean.toFixed(2)} ± ${catStd.toFixed(2)}ms\n`;

  // 4. Toggle all breadcrumbs
  results.textContent += '\n=== Toggle all breadcrumbs ===\n';
  const bcResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setCategoryVisible('breadcrumbs', false));
    const t2 = timeOperation(() => setCategoryVisible('breadcrumbs', true));
    bcResults.push((t1 + t2) / 2);
    results.textContent += `  Trial ${t + 1}: ${((t1 + t2) / 2).toFixed(2)}ms\n`;
  }
  const bcMean = bcResults.reduce((a, b) => a + b) / trials;
  const bcStd = Math.sqrt(bcResults.reduce((s, v) => s + (v - bcMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${bcMean.toFixed(2)} ± ${bcStd.toFixed(2)}ms\n`;

  // 5. Toggle marker subcategory (just clues)
  results.textContent += '\n=== Toggle marker subcategory (clues) ===\n';
  const subResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setMarkerTypeVisible('clue', false));
    const t2 = timeOperation(() => setMarkerTypeVisible('clue', true));
    subResults.push((t1 + t2) / 2);
    results.textContent += `  Trial ${t + 1}: ${((t1 + t2) / 2).toFixed(2)}ms\n`;
  }
  const subMean = subResults.reduce((a, b) => a + b) / trials;
  const subStd = Math.sqrt(subResults.reduce((s, v) => s + (v - subMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${subMean.toFixed(2)} ± ${subStd.toFixed(2)}ms\n`;

  // Summary
  results.textContent += `\n=== SUMMARY (Approach C: Hybrid) ===\n`;
  results.textContent += `Sources: 3, Style layers: ~15\n`;
  results.textContent += `FPS: ${fpsMean.toFixed(1)} ± ${fpsStd.toFixed(1)}\n`;
  results.textContent += `Single device toggle: ${togMean.toFixed(2)} ± ${togStd.toFixed(2)}ms\n`;
  results.textContent += `Category toggle (markers): ${catMean.toFixed(2)} ± ${catStd.toFixed(2)}ms\n`;
  results.textContent += `Breadcrumbs toggle: ${bcMean.toFixed(2)} ± ${bcStd.toFixed(2)}ms\n`;
  results.textContent += `Subcategory toggle (clues): ${subMean.toFixed(2)} ± ${subStd.toFixed(2)}ms\n`;

  btn.disabled = false;
}

// ─── Init ─────────────────────────────────────────────────────────────

loadData().then(initMap);
</script>
</body>
</html>
