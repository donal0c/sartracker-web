<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>S6 Approach A: Many Layers (QGIS-like)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; height: 100vh; }
  #map { flex: 1; }
  #panel { width: 320px; background: #1a1a2e; color: #eee; overflow-y: auto; padding: 12px; font-size: 13px; }
  #panel h2 { font-size: 15px; margin: 12px 0 6px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 4px; }
  #panel h2:first-child { margin-top: 0; }
  .toggle { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; }
  .toggle input { accent-color: #4dabf7; }
  .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .section-toggle { font-weight: bold; background: #2a2a4a; padding: 4px 8px; border-radius: 4px; margin: 2px 0; }
  #perf { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #0f0; padding: 6px 14px; border-radius: 6px; font-family: monospace; font-size: 13px; z-index: 999; }
  #bench-btn { display: block; margin: 12px 0; padding: 8px; background: #4dabf7; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
  #bench-results { white-space: pre-wrap; font-family: monospace; font-size: 11px; background: #111; padding: 8px; border-radius: 4px; margin-top: 8px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h2>Approach A: Many Layers</h2>
  <p style="font-size:11px;color:#888;margin-bottom:8px;">One MapLibre layer per device, per marker, per drawing. Toggle via setLayoutProperty.</p>

  <button id="bench-btn" onclick="runBenchmark()">Run Benchmark</button>
  <div id="bench-results"></div>

  <div id="toggles"></div>
</div>
<div id="perf">FPS: --</div>

<script>
const MAP_CENTER = [-9.7400, 51.9975];
let map, devices, breadcrumbs, positions, markers, drawings;
let layerIds = { positions: [], breadcrumbs: [], markers: [], drawings: [] };

// FPS counter
let frameCount = 0, lastFpsTime = performance.now(), currentFps = 0;
function fpsLoop() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    document.getElementById('perf').textContent = `FPS: ${currentFps}`;
    frameCount = 0;
    lastFpsTime = now;
  }
  requestAnimationFrame(fpsLoop);
}
requestAnimationFrame(fpsLoop);

async function loadData() {
  const [devRes, posRes, bcRes, mkRes, drRes] = await Promise.all([
    fetch('data/devices.json').then(r => r.json()),
    fetch('data/positions.geojson').then(r => r.json()),
    fetch('data/breadcrumbs.geojson').then(r => r.json()),
    fetch('data/markers.geojson').then(r => r.json()),
    fetch('data/drawings.geojson').then(r => r.json()),
  ]);
  devices = devRes;
  positions = posRes;
  breadcrumbs = bcRes;
  markers = mkRes;
  drawings = drRes;
}

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        osm: {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '&copy; OpenStreetMap contributors'
        }
      },
      layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
    },
    center: MAP_CENTER,
    zoom: 12
  });

  map.on('load', () => {
    addAllLayers();
    buildPanel();
  });
}

function addAllLayers() {
  // ── One source + two layers per device (position + breadcrumb) ──
  devices.forEach((dev, i) => {
    const posFeature = positions.features.find(f => f.properties.deviceId === dev.deviceId);
    const bcFeature = breadcrumbs.features.find(f => f.properties.deviceId === dev.deviceId);

    // Position source + layer
    const posSrcId = `pos-${dev.deviceId}`;
    const posLayerId = `layer-pos-${dev.deviceId}`;
    map.addSource(posSrcId, {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: posFeature ? [posFeature] : [] }
    });
    map.addLayer({
      id: posLayerId,
      type: 'circle',
      source: posSrcId,
      paint: {
        'circle-radius': 7,
        'circle-color': dev.color,
        'circle-stroke-width': 2,
        'circle-stroke-color': '#fff'
      }
    });
    layerIds.positions.push(posLayerId);

    // Breadcrumb source + layer
    const bcSrcId = `bc-${dev.deviceId}`;
    const bcLayerId = `layer-bc-${dev.deviceId}`;
    map.addSource(bcSrcId, {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: bcFeature ? [bcFeature] : [] }
    });
    map.addLayer({
      id: bcLayerId,
      type: 'line',
      source: bcSrcId,
      paint: {
        'line-color': dev.color,
        'line-width': 2,
        'line-opacity': 0.7
      }
    });
    layerIds.breadcrumbs.push(bcLayerId);
  });

  // ── One layer per marker ──
  markers.features.forEach((feat, i) => {
    const srcId = `marker-${i}`;
    const lyrId = `layer-marker-${i}`;
    map.addSource(srcId, {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [feat] }
    });
    map.addLayer({
      id: lyrId,
      type: 'circle',
      source: srcId,
      paint: {
        'circle-radius': 9,
        'circle-color': feat.properties.color,
        'circle-stroke-width': 2,
        'circle-stroke-color': '#000'
      }
    });
    layerIds.markers.push(lyrId);
  });

  // ── One layer per drawing ──
  drawings.features.forEach((feat, i) => {
    const srcId = `drawing-${i}`;
    const lyrId = `layer-drawing-${i}`;
    map.addSource(srcId, {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: [feat] }
    });

    if (feat.geometry.type === 'Polygon') {
      map.addLayer({
        id: lyrId + '-fill',
        type: 'fill',
        source: srcId,
        paint: {
          'fill-color': feat.properties.color,
          'fill-opacity': 0.2
        }
      });
      map.addLayer({
        id: lyrId + '-line',
        type: 'line',
        source: srcId,
        paint: {
          'line-color': feat.properties.color,
          'line-width': 2
        }
      });
      layerIds.drawings.push(lyrId + '-fill', lyrId + '-line');
    } else {
      map.addLayer({
        id: lyrId,
        type: 'line',
        source: srcId,
        paint: {
          'line-color': feat.properties.color,
          'line-width': 3
        }
      });
      layerIds.drawings.push(lyrId);
    }
  });
}

function setDeviceVisible(deviceId, visible) {
  const vis = visible ? 'visible' : 'none';
  const posLyr = `layer-pos-${deviceId}`;
  const bcLyr = `layer-bc-${deviceId}`;
  if (map.getLayer(posLyr)) map.setLayoutProperty(posLyr, 'visibility', vis);
  if (map.getLayer(bcLyr)) map.setLayoutProperty(bcLyr, 'visibility', vis);
}

function setMarkerVisible(idx, visible) {
  const vis = visible ? 'visible' : 'none';
  const lyrId = `layer-marker-${idx}`;
  if (map.getLayer(lyrId)) map.setLayoutProperty(lyrId, 'visibility', vis);
}

function setDrawingVisible(idx, visible) {
  const vis = visible ? 'visible' : 'none';
  const fillId = `layer-drawing-${idx}-fill`;
  const lineId = `layer-drawing-${idx}-line`;
  const plainId = `layer-drawing-${idx}`;
  if (map.getLayer(fillId)) map.setLayoutProperty(fillId, 'visibility', vis);
  if (map.getLayer(lineId)) map.setLayoutProperty(lineId, 'visibility', vis);
  if (map.getLayer(plainId)) map.setLayoutProperty(plainId, 'visibility', vis);
}

function setCategoryVisible(category, visible) {
  if (category === 'positions') {
    devices.forEach(d => {
      const vis = visible ? 'visible' : 'none';
      const lyr = `layer-pos-${d.deviceId}`;
      if (map.getLayer(lyr)) map.setLayoutProperty(lyr, 'visibility', vis);
    });
  } else if (category === 'breadcrumbs') {
    devices.forEach(d => {
      const vis = visible ? 'visible' : 'none';
      const lyr = `layer-bc-${d.deviceId}`;
      if (map.getLayer(lyr)) map.setLayoutProperty(lyr, 'visibility', vis);
    });
  } else if (category === 'markers') {
    markers.features.forEach((_, i) => setMarkerVisible(i, visible));
  } else if (category === 'drawings') {
    drawings.features.forEach((_, i) => setDrawingVisible(i, visible));
  }
}

function buildPanel() {
  const panel = document.getElementById('toggles');
  let html = '';

  // Devices section
  html += '<h2>People (30 devices)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('positions', this.checked); setCategoryVisible('breadcrumbs', this.checked)"> All Devices</label>`;
  devices.forEach(d => {
    html += `<label class="toggle"><input type="checkbox" checked onchange="setDeviceVisible('${d.deviceId}', this.checked)"><span class="color-dot" style="background:${d.color}"></span>${d.name}</label>`;
  });

  // Breadcrumbs toggle
  html += '<h2>Breadcrumbs</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('breadcrumbs', this.checked)"> All Breadcrumbs</label>`;

  // Markers section
  html += '<h2>Markers (15)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('markers', this.checked)"> All Markers</label>`;
  markers.features.forEach((f, i) => {
    html += `<label class="toggle"><input type="checkbox" checked onchange="setMarkerVisible(${i}, this.checked)"><span class="color-dot" style="background:${f.properties.color}"></span>${f.properties.name}</label>`;
  });

  // Drawings section
  html += '<h2>Drawings (12)</h2>';
  html += `<label class="toggle section-toggle"><input type="checkbox" checked onchange="setCategoryVisible('drawings', this.checked)"> All Drawings</label>`;
  drawings.features.forEach((f, i) => {
    html += `<label class="toggle"><input type="checkbox" checked onchange="setDrawingVisible(${i}, this.checked)"><span class="color-dot" style="background:${f.properties.color}"></span>${f.properties.name}</label>`;
  });

  panel.innerHTML = html;
}

// ─── Benchmarking ─────────────────────────────────────────────────────

function measureFps(durationMs) {
  return new Promise(resolve => {
    let frames = 0;
    const start = performance.now();
    function tick() {
      frames++;
      if (performance.now() - start < durationMs) {
        requestAnimationFrame(tick);
      } else {
        resolve(Math.round(frames * 1000 / (performance.now() - start)));
      }
    }
    requestAnimationFrame(tick);
  });
}

function timeOperation(fn) {
  const start = performance.now();
  fn();
  // Force a synchronous style recalc
  map.triggerRepaint();
  return performance.now() - start;
}

async function runBenchmark() {
  const results = document.getElementById('bench-results');
  results.textContent = 'Running benchmark...\n';
  const btn = document.getElementById('bench-btn');
  btn.disabled = true;

  const trials = 5;

  // 1. FPS during pan/zoom with all visible
  results.textContent += '\n=== FPS (all data visible, panning) ===\n';
  const fpsResults = [];
  for (let t = 0; t < trials; t++) {
    // Trigger panning animation
    map.panBy([50, 0], { duration: 0 });
    map.panBy([-50, 0], { duration: 0 });
    const fps = await measureFps(2000);
    fpsResults.push(fps);
    results.textContent += `  Trial ${t + 1}: ${fps} FPS\n`;
  }
  const fpsMean = fpsResults.reduce((a, b) => a + b) / trials;
  const fpsStd = Math.sqrt(fpsResults.reduce((s, v) => s + (v - fpsMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${fpsMean.toFixed(1)} ± ${fpsStd.toFixed(1)} FPS\n`;

  // 2. Toggle one device
  results.textContent += '\n=== Toggle single device ===\n';
  const toggleResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setDeviceVisible('device-001', false));
    const t2 = timeOperation(() => setDeviceVisible('device-001', true));
    const avg = (t1 + t2) / 2;
    toggleResults.push(avg);
    results.textContent += `  Trial ${t + 1}: ${avg.toFixed(2)}ms\n`;
  }
  const togMean = toggleResults.reduce((a, b) => a + b) / trials;
  const togStd = Math.sqrt(toggleResults.reduce((s, v) => s + (v - togMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${togMean.toFixed(2)} ± ${togStd.toFixed(2)}ms\n`;

  // 3. Toggle category (all markers)
  results.textContent += '\n=== Toggle all markers ===\n';
  const catResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setCategoryVisible('markers', false));
    const t2 = timeOperation(() => setCategoryVisible('markers', true));
    const avg = (t1 + t2) / 2;
    catResults.push(avg);
    results.textContent += `  Trial ${t + 1}: ${avg.toFixed(2)}ms\n`;
  }
  const catMean = catResults.reduce((a, b) => a + b) / trials;
  const catStd = Math.sqrt(catResults.reduce((s, v) => s + (v - catMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${catMean.toFixed(2)} ± ${catStd.toFixed(2)}ms\n`;

  // 4. Toggle all breadcrumbs
  results.textContent += '\n=== Toggle all breadcrumbs ===\n';
  const bcResults = [];
  for (let t = 0; t < trials; t++) {
    const t1 = timeOperation(() => setCategoryVisible('breadcrumbs', false));
    const t2 = timeOperation(() => setCategoryVisible('breadcrumbs', true));
    const avg = (t1 + t2) / 2;
    bcResults.push(avg);
    results.textContent += `  Trial ${t + 1}: ${avg.toFixed(2)}ms\n`;
  }
  const bcMean = bcResults.reduce((a, b) => a + b) / trials;
  const bcStd = Math.sqrt(bcResults.reduce((s, v) => s + (v - bcMean) ** 2, 0) / trials);
  results.textContent += `  Mean: ${bcMean.toFixed(2)} ± ${bcStd.toFixed(2)}ms\n`;

  // Summary
  results.textContent += `\n=== SUMMARY (Approach A: Many Layers) ===\n`;
  results.textContent += `Total MapLibre layers: ${layerIds.positions.length + layerIds.breadcrumbs.length + layerIds.markers.length + layerIds.drawings.length}\n`;
  results.textContent += `FPS: ${fpsMean.toFixed(1)} ± ${fpsStd.toFixed(1)}\n`;
  results.textContent += `Single device toggle: ${togMean.toFixed(2)} ± ${togStd.toFixed(2)}ms\n`;
  results.textContent += `Category toggle (markers): ${catMean.toFixed(2)} ± ${catStd.toFixed(2)}ms\n`;
  results.textContent += `Breadcrumbs toggle: ${bcMean.toFixed(2)} ± ${bcStd.toFixed(2)}ms\n`;

  btn.disabled = false;
}

// ─── Init ─────────────────────────────────────────────────────────────

loadData().then(initMap);
</script>
</body>
</html>
