<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>S6 Filter Panel Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #0d1117; }
  #map { flex: 1; }

  /* Panel */
  #panel {
    width: 300px;
    background: #161b22;
    color: #e6edf3;
    overflow-y: auto;
    border-left: 1px solid #30363d;
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 12px 16px;
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h2 { font-size: 14px; font-weight: 600; }

  /* Sections */
  .section {
    border-bottom: 1px solid #21262d;
  }
  .section-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    background: #0d1117;
    gap: 8px;
  }
  .section-header:hover { background: #161b22; }
  .section-header .chevron {
    font-size: 10px;
    color: #8b949e;
    transition: transform 0.15s;
    width: 12px;
  }
  .section-header .chevron.open { transform: rotate(90deg); }
  .section-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #c9d1d9;
  }
  .section-count {
    font-size: 11px;
    color: #8b949e;
    background: #21262d;
    padding: 1px 6px;
    border-radius: 10px;
  }
  .section-actions {
    display: flex;
    gap: 4px;
  }
  .section-actions button {
    font-size: 10px;
    padding: 2px 6px;
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    border-radius: 4px;
    cursor: pointer;
  }
  .section-actions button:hover { color: #e6edf3; background: #30363d; }

  .section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease-out;
  }
  .section-body.open {
    max-height: 2000px;
  }

  /* Subcategory */
  .subcategory-header {
    display: flex;
    align-items: center;
    padding: 5px 16px 5px 28px;
    gap: 6px;
    font-size: 12px;
    color: #8b949e;
    font-weight: 600;
    background: #0d1117;
    border-top: 1px solid #21262d;
  }

  /* Item row */
  .item {
    display: flex;
    align-items: center;
    padding: 4px 16px 4px 40px;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .item:hover { background: #1c2128; }
  .item.disabled { opacity: 0.4; }

  .item input[type="checkbox"] {
    accent-color: #58a6ff;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .color-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .item-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-meta {
    font-size: 10px;
    color: #8b949e;
  }

  /* Device-specific styles */
  .device-item .item-meta {
    display: flex;
    gap: 6px;
  }
  .battery { color: #3fb950; }
  .battery.low { color: #f85149; }

  /* Search box */
  .search-box {
    padding: 8px 16px;
    border-bottom: 1px solid #30363d;
  }
  .search-box input {
    width: 100%;
    padding: 6px 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 12px;
    outline: none;
  }
  .search-box input:focus { border-color: #58a6ff; }

  /* Status bar */
  #status {
    padding: 6px 16px;
    background: #0d1117;
    border-top: 1px solid #30363d;
    font-size: 11px;
    color: #8b949e;
    flex-shrink: 0;
  }

  #perf { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #3fb950; padding: 6px 14px; border-radius: 6px; font-family: monospace; font-size: 13px; z-index: 999; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <div class="panel-header">
    <h2>Layers</h2>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Filter layers..." oninput="filterItems(this.value)" />
  </div>
  <div id="sections" style="flex:1;overflow-y:auto;"></div>
  <div id="status">Loading...</div>
</div>
<div id="perf">FPS: --</div>

<script>
const MAP_CENTER = [-9.7400, 51.9975];
let map, devices, breadcrumbs, positions, markers, drawings;

// State (using Approach C architecture — the hybrid)
let hiddenDevices = new Set();
let hiddenMarkersByType = { ipp_lkp: new Set(), clue: new Set(), hazard: new Set(), casualty: new Set() };
let hiddenDrawingsByType = { search_area: new Set(), range_ring: new Set(), bearing_line: new Set(), search_sector: new Set() };
let categoryVisibility = { positions: true, breadcrumbs: true };
let sectionOpen = { people: true, markers: true, drawings: true };

// FPS
let frameCount = 0, lastFpsTime = performance.now();
function fpsLoop() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    document.getElementById('perf').textContent = `FPS: ${fps}`;
    frameCount = 0;
    lastFpsTime = now;
  }
  requestAnimationFrame(fpsLoop);
}
requestAnimationFrame(fpsLoop);

async function loadData() {
  [devices, positions, breadcrumbs, markers, drawings] = await Promise.all([
    fetch('data/devices.json').then(r => r.json()),
    fetch('data/positions.geojson').then(r => r.json()),
    fetch('data/breadcrumbs.geojson').then(r => r.json()),
    fetch('data/markers.geojson').then(r => r.json()),
    fetch('data/drawings.geojson').then(r => r.json()),
  ]);
}

function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '&copy; OSM' }
      },
      layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
    },
    center: MAP_CENTER,
    zoom: 12
  });

  map.on('load', () => {
    addSourcesAndLayers();
    buildPanel();
    updateStatus();
  });
}

function addSourcesAndLayers() {
  // Tracking source
  map.addSource('tracking', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [...positions.features, ...breadcrumbs.features] }
  });

  // Markers source
  map.addSource('markers', { type: 'geojson', data: markers });

  // Drawings source
  map.addSource('drawings', { type: 'geojson', data: drawings });

  // Breadcrumbs
  map.addLayer({
    id: 'breadcrumbs-layer', type: 'line', source: 'tracking',
    filter: ['==', '$type', 'LineString'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 2, 'line-opacity': 0.7 }
  });

  // Positions
  map.addLayer({
    id: 'positions-layer', type: 'circle', source: 'tracking',
    filter: ['==', '$type', 'Point'],
    paint: { 'circle-radius': 7, 'circle-color': ['get', 'color'], 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' }
  });

  // Marker subcategory layers
  ['ipp_lkp', 'clue', 'hazard', 'casualty'].forEach(type => {
    map.addLayer({
      id: `markers-${type}`, type: 'circle', source: 'markers',
      filter: ['==', ['get', 'markerType'], type],
      paint: { 'circle-radius': 9, 'circle-color': ['get', 'color'], 'circle-stroke-width': 2, 'circle-stroke-color': '#000' }
    });
  });

  // Drawing subcategory layers
  ['search_area', 'range_ring', 'search_sector'].forEach(type => {
    const slug = type.replace(/_/g, '-');
    map.addLayer({
      id: `drawings-${slug}-fill`, type: 'fill', source: 'drawings',
      filter: ['==', ['get', 'drawingType'], type],
      paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.2 }
    });
    map.addLayer({
      id: `drawings-${slug}-line`, type: 'line', source: 'drawings',
      filter: ['==', ['get', 'drawingType'], type],
      paint: { 'line-color': ['get', 'color'], 'line-width': 2 }
    });
  });

  map.addLayer({
    id: 'drawings-bearing-line', type: 'line', source: 'drawings',
    filter: ['==', ['get', 'drawingType'], 'bearing_line'],
    paint: { 'line-color': ['get', 'color'], 'line-width': 3 }
  });
}

// ── Filter Logic (Approach C) ──

function applyTrackingFilters() {
  if (!categoryVisibility.positions) {
    map.setFilter('positions-layer', false);
  } else if (hiddenDevices.size === 0) {
    map.setFilter('positions-layer', ['==', '$type', 'Point']);
  } else {
    map.setFilter('positions-layer', ['all', ['==', '$type', 'Point'], ['!', ['in', ['get', 'deviceId'], ['literal', [...hiddenDevices]]]]]);
  }

  if (!categoryVisibility.breadcrumbs) {
    map.setFilter('breadcrumbs-layer', false);
  } else if (hiddenDevices.size === 0) {
    map.setFilter('breadcrumbs-layer', ['==', '$type', 'LineString']);
  } else {
    map.setFilter('breadcrumbs-layer', ['all', ['==', '$type', 'LineString'], ['!', ['in', ['get', 'deviceId'], ['literal', [...hiddenDevices]]]]]);
  }
}

function applyMarkerFilters(type) {
  const hidden = hiddenMarkersByType[type];
  const layerId = `markers-${type}`;
  if (hidden.size === 0) {
    map.setFilter(layerId, ['==', ['get', 'markerType'], type]);
  } else {
    map.setFilter(layerId, ['all', ['==', ['get', 'markerType'], type], ['!', ['in', ['get', 'id'], ['literal', [...hidden]]]]]);
  }
}

function applyDrawingFilters(type) {
  const hidden = hiddenDrawingsByType[type];
  const slug = type.replace(/_/g, '-');
  [`drawings-${slug}-fill`, `drawings-${slug}-line`, `drawings-${slug}`].forEach(layerId => {
    if (!map.getLayer(layerId)) return;
    if (hidden.size === 0) {
      map.setFilter(layerId, ['==', ['get', 'drawingType'], type]);
    } else {
      map.setFilter(layerId, ['all', ['==', ['get', 'drawingType'], type], ['!', ['in', ['get', 'id'], ['literal', [...hidden]]]]]);
    }
  });
}

// ── Toggle Functions ──

function toggleDevice(deviceId) {
  if (hiddenDevices.has(deviceId)) hiddenDevices.delete(deviceId);
  else hiddenDevices.add(deviceId);
  applyTrackingFilters();
  updatePanel();
}

function toggleMarker(type, id) {
  const set = hiddenMarkersByType[type];
  if (set.has(id)) set.delete(id);
  else set.add(id);
  applyMarkerFilters(type);
  updatePanel();
}

function toggleDrawing(type, id) {
  const set = hiddenDrawingsByType[type];
  if (set.has(id)) set.delete(id);
  else set.add(id);
  applyDrawingFilters(type);
  updatePanel();
}

function allOn(category) {
  if (category === 'people') {
    hiddenDevices.clear();
    categoryVisibility.positions = true;
    categoryVisibility.breadcrumbs = true;
    applyTrackingFilters();
  } else if (category === 'markers') {
    Object.values(hiddenMarkersByType).forEach(s => s.clear());
    ['ipp_lkp', 'clue', 'hazard', 'casualty'].forEach(t => applyMarkerFilters(t));
  } else if (category === 'drawings') {
    Object.values(hiddenDrawingsByType).forEach(s => s.clear());
    ['search_area', 'range_ring', 'bearing_line', 'search_sector'].forEach(t => applyDrawingFilters(t));
  }
  updatePanel();
}

function allOff(category) {
  if (category === 'people') {
    devices.forEach(d => hiddenDevices.add(d.deviceId));
    categoryVisibility.positions = false;
    categoryVisibility.breadcrumbs = false;
    applyTrackingFilters();
  } else if (category === 'markers') {
    markers.features.forEach(f => hiddenMarkersByType[f.properties.markerType].add(f.properties.id));
    ['ipp_lkp', 'clue', 'hazard', 'casualty'].forEach(t => applyMarkerFilters(t));
  } else if (category === 'drawings') {
    drawings.features.forEach(f => {
      if (hiddenDrawingsByType[f.properties.drawingType]) {
        hiddenDrawingsByType[f.properties.drawingType].add(f.properties.id);
      }
    });
    ['search_area', 'range_ring', 'bearing_line', 'search_sector'].forEach(t => applyDrawingFilters(t));
  }
  updatePanel();
}

function toggleSection(section) {
  sectionOpen[section] = !sectionOpen[section];
  updatePanel();
}

// ── Panel Rendering ──

function buildPanel() { updatePanel(); }

function updatePanel() {
  const searchValue = (document.getElementById('search')?.value || '').toLowerCase();
  const container = document.getElementById('sections');
  let html = '';

  // ── People Section ──
  const visibleDevices = devices.filter(d => !searchValue || d.name.toLowerCase().includes(searchValue));
  const activeDeviceCount = devices.length - hiddenDevices.size;
  html += buildSection('people', `People`, activeDeviceCount, devices.length, () => {
    let inner = '';
    visibleDevices.forEach(d => {
      const pos = positions.features.find(f => f.properties.deviceId === d.deviceId);
      const visible = !hiddenDevices.has(d.deviceId);
      const battery = pos?.properties?.battery || 0;
      inner += `
        <div class="item device-item ${visible ? '' : 'disabled'}" onclick="toggleDevice('${d.deviceId}')">
          <input type="checkbox" ${visible ? 'checked' : ''} onclick="event.stopPropagation(); toggleDevice('${d.deviceId}')" />
          <span class="color-indicator" style="background:${d.color}"></span>
          <span class="item-name">${d.name}</span>
          <span class="item-meta">
            <span class="battery ${battery < 25 ? 'low' : ''}">${battery}%</span>
          </span>
        </div>`;
    });
    return inner;
  });

  // ── Markers Section ──
  const markerTypeLabels = { ipp_lkp: 'IPP / LKP', clue: 'Clues', hazard: 'Hazards', casualty: 'Casualties' };
  const totalHiddenMarkers = Object.values(hiddenMarkersByType).reduce((s, set) => s + set.size, 0);
  const activeMarkerCount = markers.features.length - totalHiddenMarkers;

  html += buildSection('markers', 'Markers', activeMarkerCount, markers.features.length, () => {
    let inner = '';
    for (const [type, label] of Object.entries(markerTypeLabels)) {
      const typeMarkers = markers.features.filter(f => f.properties.markerType === type);
      const visibleTypeMarkers = typeMarkers.filter(f => !searchValue || f.properties.name.toLowerCase().includes(searchValue));
      if (visibleTypeMarkers.length === 0 && searchValue) continue;

      const hiddenCount = hiddenMarkersByType[type].size;
      inner += `<div class="subcategory-header">
        <input type="checkbox" ${hiddenCount === 0 ? 'checked' : (hiddenCount < typeMarkers.length ? '' : '')}
          onchange="this.checked ? allOnType('markers', '${type}') : allOffType('markers', '${type}')" />
        ${label} (${typeMarkers.length - hiddenCount}/${typeMarkers.length})
      </div>`;

      visibleTypeMarkers.forEach(f => {
        const visible = !hiddenMarkersByType[type].has(f.properties.id);
        inner += `
          <div class="item ${visible ? '' : 'disabled'}" onclick="toggleMarker('${type}', '${f.properties.id}')">
            <input type="checkbox" ${visible ? 'checked' : ''} onclick="event.stopPropagation(); toggleMarker('${type}', '${f.properties.id}')" />
            <span class="color-indicator" style="background:${f.properties.color}"></span>
            <span class="item-name">${f.properties.name}</span>
            <span class="item-meta">${f.properties.subType || ''}</span>
          </div>`;
      });
    }
    return inner;
  });

  // ── Drawings Section ──
  const drawingTypeLabels = { search_area: 'Search Areas', range_ring: 'Range Rings', bearing_line: 'Bearing Lines', search_sector: 'Search Sectors' };
  const totalHiddenDrawings = Object.values(hiddenDrawingsByType).reduce((s, set) => s + set.size, 0);
  const activeDrawingCount = drawings.features.length - totalHiddenDrawings;

  html += buildSection('drawings', 'Drawings', activeDrawingCount, drawings.features.length, () => {
    let inner = '';
    for (const [type, label] of Object.entries(drawingTypeLabels)) {
      const typeDrawings = drawings.features.filter(f => f.properties.drawingType === type);
      const visibleTypeDrawings = typeDrawings.filter(f => !searchValue || f.properties.name.toLowerCase().includes(searchValue));
      if (visibleTypeDrawings.length === 0 && searchValue) continue;
      if (typeDrawings.length === 0) continue;

      const hiddenCount = hiddenDrawingsByType[type].size;
      inner += `<div class="subcategory-header">
        <input type="checkbox" ${hiddenCount === 0 ? 'checked' : ''}
          onchange="this.checked ? allOnType('drawings', '${type}') : allOffType('drawings', '${type}')" />
        ${label} (${typeDrawings.length - hiddenCount}/${typeDrawings.length})
      </div>`;

      visibleTypeDrawings.forEach(f => {
        const visible = !hiddenDrawingsByType[type].has(f.properties.id);
        inner += `
          <div class="item ${visible ? '' : 'disabled'}" onclick="toggleDrawing('${type}', '${f.properties.id}')">
            <input type="checkbox" ${visible ? 'checked' : ''} onclick="event.stopPropagation(); toggleDrawing('${type}', '${f.properties.id}')" />
            <span class="color-indicator" style="background:${f.properties.color}"></span>
            <span class="item-name">${f.properties.name}</span>
          </div>`;
      });
    }
    return inner;
  });

  container.innerHTML = html;
  updateStatus();
}

function buildSection(id, title, activeCount, totalCount, contentBuilder) {
  const isOpen = sectionOpen[id];
  return `
    <div class="section">
      <div class="section-header" onclick="toggleSection('${id}')">
        <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
        <span class="section-title">${title}</span>
        <span class="section-count">${activeCount}/${totalCount}</span>
        <div class="section-actions" onclick="event.stopPropagation()">
          <button onclick="allOn('${id}')">All</button>
          <button onclick="allOff('${id}')">None</button>
        </div>
      </div>
      <div class="section-body ${isOpen ? 'open' : ''}">${isOpen ? contentBuilder() : ''}</div>
    </div>`;
}

// Type-level toggles
function allOnType(category, type) {
  if (category === 'markers') {
    hiddenMarkersByType[type].clear();
    applyMarkerFilters(type);
  } else if (category === 'drawings') {
    hiddenDrawingsByType[type].clear();
    applyDrawingFilters(type);
  }
  updatePanel();
}

function allOffType(category, type) {
  if (category === 'markers') {
    markers.features.filter(f => f.properties.markerType === type).forEach(f => hiddenMarkersByType[type].add(f.properties.id));
    applyMarkerFilters(type);
  } else if (category === 'drawings') {
    drawings.features.filter(f => f.properties.drawingType === type).forEach(f => hiddenDrawingsByType[type].add(f.properties.id));
    applyDrawingFilters(type);
  }
  updatePanel();
}

function filterItems(query) {
  updatePanel();
}

function updateStatus() {
  const totalVisible = (devices.length - hiddenDevices.size)
    + (markers.features.length - Object.values(hiddenMarkersByType).reduce((s, set) => s + set.size, 0))
    + (drawings.features.length - Object.values(hiddenDrawingsByType).reduce((s, set) => s + set.size, 0));
  const total = devices.length + markers.features.length + drawings.features.length;
  document.getElementById('status').textContent = `${totalVisible}/${total} items visible • Approach C (Hybrid)`;
}

// ── Init ──

loadData().then(initMap);
</script>
</body>
</html>
