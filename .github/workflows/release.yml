name: Release (Tauri Beta)

# Cross-platform Tauri beta distribution.
#
# Triggered by tag push (v*) or manual workflow_dispatch. Builds Linux (primary),
# Windows (secondary), and macOS arm64 (parity/evidence) artifacts and uploads
# them to a draft+prerelease GitHub release. The release stays in DRAFT until a
# human reviews and publishes it via `gh release edit <tag> --draft=false`.
#
# Architecture:
#   1. `gates` (Linux only): version-trio assertion, release-notes existence,
#      lint, vitest, cargo test, web build. Fast-fail before any bundling.
#   2. `bundle` (matrix): Linux/Windows/macOS-arm64 in parallel via tauri-action.
#      First runner to finish creates the draft release; the others upload to it.
#   3. `checksums` (Linux only): downloads release assets, generates SHA256SUMS,
#      uploads as a release asset.
#   4. `summary` (always): posts a Markdown summary with provenance.
#
# See docs/tauri-beta-release-plan.md for the broader release strategy.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (must already exist in the repo, e.g. v0.1.0-beta.1)'
        required: true
        type: string
      dry_run:
        description: 'Run gates and bundles but skip release upload'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: '1.94.1'
  TAURI_ACTION_VERSION: 'v0.6.2'

jobs:
  gates:
    name: Gates (lint, test, build)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      version: ${{ steps.resolve_tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag and version
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve tag from event or input."
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::Tag must start with 'v' followed by a digit. Got: $TAG"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Verify version trio (tag, package.json, tauri.conf.json)
        env:
          EXPECTED_VERSION: ${{ steps.resolve_tag.outputs.version }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag version:          $EXPECTED_VERSION"
          echo "package.json:         $PKG_VERSION"
          echo "src-tauri/tauri.conf: $TAURI_VERSION"
          if [ "$PKG_VERSION" != "$EXPECTED_VERSION" ] || [ "$TAURI_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch. Tag=$EXPECTED_VERSION package.json=$PKG_VERSION tauri.conf.json=$TAURI_VERSION. All three must match. Refusing to build a release with inconsistent version metadata."
            exit 1
          fi

      - name: Verify release notes exist
        env:
          VERSION: ${{ steps.resolve_tag.outputs.version }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/sartracker-web-${VERSION}-beta.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file missing: $NOTES_FILE"
            echo "::error::Copy docs/releases/TEMPLATE.md to that path, fill it in, commit, and re-tag."
            exit 1
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::Release notes file is empty: $NOTES_FILE"
            exit 1
          fi
          echo "Release notes verified: $NOTES_FILE ($(wc -c < "$NOTES_FILE") bytes)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'gates-linux'
          cache-on-failure: true

      - name: Install npm deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Web build (also runs bundle-size check)
        run: npm run build

      - name: Backend tests (cargo test)
        run: npm run test:backend

  bundle:
    name: Bundle (${{ matrix.label }})
    needs: gates
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--bundles appimage,deb'
          - label: windows-x86_64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc --bundles nsis,msi'
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles app,dmg'
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gates.outputs.tag }}

      - name: Show OS sanity
        shell: bash
        run: |
          echo "Runner: ${{ matrix.runner }}"
          echo "Target: ${{ matrix.target }}"
          if [ -f /etc/os-release ]; then cat /etc/os-release; fi
          uname -a

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'bundle-${{ matrix.label }}'
          cache-on-failure: true

      - name: Install npm deps
        run: npm ci

      - name: Read release notes
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.gates.outputs.version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          TAURI_ACTION_VERSION: ${{ env.TAURI_ACTION_VERSION }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/sartracker-web-${VERSION}-beta.md"
          BODY_FILE="$RUNNER_TEMP/release-body.md"
          {
            cat "$NOTES_FILE"
            echo ""
            echo "---"
            echo ""
            echo "## CI Provenance"
            echo ""
            echo "- Build commit: \`${GITHUB_SHA}\`"
            echo "- Run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- Workflow: \`.github/workflows/release.yml\`"
            echo "- Action: \`tauri-apps/tauri-action@${TAURI_ACTION_VERSION}\`"
          } > "$BODY_FILE"
          # Emit a multiline step output using a randomly-generated EOF marker
          # so any line in the markdown body is safe.
          EOF=$(openssl rand -hex 16)
          {
            echo "body<<$EOF"
            cat "$BODY_FILE"
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Release body prepared (length: $(wc -c < "$BODY_FILE") bytes)"

      - name: Build and upload (tauri-action)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.gates.outputs.tag }}
          releaseName: 'SAR Tracker Web ${{ needs.gates.outputs.tag }} (internal beta)'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
          releaseAssetNamePattern: 'sartracker-web_[version]_[platform]_[arch][ext]'
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          retryAttempts: 1

      - name: Build only (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          npm run tauri build -- ${{ matrix.args }}
          echo "Dry run: skipping release upload."
          echo "Bundle output:"
          if [ -d src-tauri/target ]; then
            find src-tauri/target -type f \( \
              -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
              -o -name '*-setup.exe' -o -name '*.msi' \
              -o -name '*.dmg' -o -name '*.app.tar.gz' \
            \) -print 2>/dev/null || true
          fi

  checksums:
    name: SHA256SUMS sidecar
    needs: [gates, bundle]
    if: ${{ github.event.inputs.dry_run != 'true' && needs.bundle.result == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          # Brief settle window in case GitHub's release-asset index is slightly behind.
          sleep 10
          # Fetch every non-checksum asset from the draft release.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' \
            | grep -v '^SHA256SUMS$' \
            | while read -r NAME; do
                echo "Downloading $NAME"
                gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$NAME" --dir assets
              done

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd assets
          shopt -s nullglob
          files=( * )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No release assets found to hash."
            exit 1
          fi
          sha256sum -- "${files[@]}" > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber assets/SHA256SUMS

  summary:
    name: Summary
    needs: [gates, bundle, checksums]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Build summary
        env:
          TAG: ${{ needs.gates.outputs.tag }}
          GATES_RESULT: ${{ needs.gates.result }}
          BUNDLE_RESULT: ${{ needs.bundle.result }}
          CHECKSUMS_RESULT: ${{ needs.checksums.result }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          {
            echo "# Release run summary"
            echo ""
            echo "- Tag: \`${TAG:-(unresolved)}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            echo ""
            echo "## Job results"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| gates | ${GATES_RESULT} |"
            echo "| bundle | ${BUNDLE_RESULT} |"
            echo "| checksums | ${CHECKSUMS_RESULT} |"
            echo ""
            echo "## Next step"
            echo ""
            if [ "$BUNDLE_RESULT" = "success" ] && [ "$DRY_RUN" != "true" ]; then
              echo "The release for \`${TAG}\` is in **DRAFT**. Review the assets and the body, then publish with:"
              echo ""
              echo '```bash'
              echo "gh release view ${TAG} --repo ${GITHUB_REPOSITORY}"
              echo "gh release edit ${TAG} --repo ${GITHUB_REPOSITORY} --draft=false"
              echo '```'
            else
              echo "Bundle did not complete cleanly. Investigate the failed jobs above before publishing."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
