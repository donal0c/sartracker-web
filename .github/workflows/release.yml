name: Release (Tauri Beta)

# Cross-platform Tauri beta distribution.
#
# Triggered by tag push (v*) or manual workflow_dispatch. Builds Linux (primary),
# Windows (secondary), and macOS arm64 (parity/evidence) artifacts and uploads
# them to a draft+prerelease GitHub release. The release stays in DRAFT until a
# human reviews and publishes it via `gh release edit <tag> --draft=false`.
#
# Architecture:
#   1. `gates` (Linux only): version-trio assertion, release-notes existence,
#      lint, vitest, cargo test, web build, live beta dependency preflight.
#      Fast-fail before any bundling.
#   2. `bundle` (matrix): Linux + Windows in parallel via tauri-action.
#      First runner to finish creates the draft release; the other uploads to it.
#   3. `launch-smoke-linux` / `launch-smoke-windows`: download the just-built
#      release assets, start them on native runners, and capture screenshots.
#   4. `checksums` (Linux only): downloads release assets, generates SHA256SUMS,
#      uploads as a release asset.
#   5. `summary` (always): posts a Markdown summary with provenance.
#
# macOS arm64 was deliberately dropped from the CI matrix to keep billed minutes
# inside the GitHub Actions free tier (macOS runners bill at 10x). The macOS
# build is produced locally via `npm run beta:verify` (Path B in
# docs/releases/README.md). Re-adding macOS to CI is tracked by
# `sartracker-web-590` and gated on a stable lower release cadence.
#
# See docs/tauri-beta-release-plan.md for the broader release strategy.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (must already exist in the repo, e.g. v0.1.0-beta.1)'
        required: true
        type: string
      dry_run:
        description: 'Run gates and bundles but skip release upload'
        required: false
        type: boolean
        default: false
      smoke_existing_release:
        description: 'Skip bundling/upload and run launch smoke against assets already attached to the tag release'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  RUST_TOOLCHAIN: '1.94.1'
  TAURI_ACTION_VERSION: 'v0.6.2'

jobs:
  gates:
    name: Gates (lint, test, build)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
      version: ${{ steps.resolve_tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag and version
        id: resolve_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve tag from event or input."
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "::error::Tag must start with 'v' followed by a digit. Got: $TAG"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Verify version trio (tag, package.json, tauri.conf.json)
        env:
          EXPECTED_VERSION: ${{ steps.resolve_tag.outputs.version }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag version:          $EXPECTED_VERSION"
          echo "package.json:         $PKG_VERSION"
          echo "src-tauri/tauri.conf: $TAURI_VERSION"
          if [ "$PKG_VERSION" != "$EXPECTED_VERSION" ] || [ "$TAURI_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch. Tag=$EXPECTED_VERSION package.json=$PKG_VERSION tauri.conf.json=$TAURI_VERSION. All three must match. Refusing to build a release with inconsistent version metadata."
            exit 1
          fi

      - name: Verify release notes exist
        env:
          VERSION: ${{ steps.resolve_tag.outputs.version }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/sartracker-web-${VERSION}-beta.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file missing: $NOTES_FILE"
            echo "::error::Copy docs/releases/TEMPLATE.md to that path, fill it in, commit, and re-tag."
            exit 1
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::Release notes file is empty: $NOTES_FILE"
            exit 1
          fi
          echo "Release notes verified: $NOTES_FILE ($(wc -c < "$NOTES_FILE") bytes)"

      - name: Install Linux build deps (needed for cargo test which pulls gdk-sys etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'gates-linux'
          cache-on-failure: true

      - name: Install npm deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Web build (also runs bundle-size check)
        run: npm run build

      - name: Backend tests (cargo test)
        run: npm run test:backend

      - name: Live beta dependency preflight
        env:
          TRACCAR_BASE_URL: 'http://kmrtsar.eu:8082'
          TRACCAR_EMAIL: 'apiuser'
          TRACCAR_PASSWORD: 'apiuser'
        run: |
          set -euo pipefail
          COOKIE_JAR="$RUNNER_TEMP/traccar.cookies"
          DEVICES_JSON="$RUNNER_TEMP/traccar-devices.json"

          curl --fail-with-body --silent --show-error --max-time 15 \
            --cookie-jar "$COOKIE_JAR" \
            --request POST \
            --header 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode "email=${TRACCAR_EMAIL}" \
            --data-urlencode "password=${TRACCAR_PASSWORD}" \
            "${TRACCAR_BASE_URL}/api/session" >/dev/null

          curl --fail-with-body --silent --show-error --max-time 15 \
            --cookie "$COOKIE_JAR" \
            "${TRACCAR_BASE_URL}/api/devices" > "$DEVICES_JSON"

          node -e "const fs=require('fs'); const devices=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); if (!Array.isArray(devices) || devices.length === 0) { throw new Error('Traccar preflight returned no devices'); } console.log('Traccar devices visible:', devices.length);" "$DEVICES_JSON"

          curl --fail --silent --show-error --head --max-time 15 \
            'https://tile.opentopomap.org/12/1939/1355.png' >/dev/null
          curl --fail --silent --show-error --head --max-time 15 \
            'https://tile.openstreetmap.org/12/1939/1355.png' >/dev/null
          curl --fail --silent --show-error --head --max-time 15 \
            'https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/12/1355/1939' >/dev/null

  bundle:
    name: Bundle (${{ matrix.label }})
    needs: gates
    if: ${{ github.event.inputs.smoke_existing_release != 'true' }}
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: '--bundles appimage,deb'
          - label: windows-x86_64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            # MSI deliberately omitted: Tauri's MSI bundler rejects alphanumeric
            # pre-release suffixes (e.g. "-beta.2"). See sartracker-web-g1u to
            # re-add when the version scheme supports it.
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
          # macOS arm64 deliberately dropped from the matrix; see sartracker-web-590.
          # macOS builds are produced locally via npm run beta:verify (Path B).
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gates.outputs.tag }}

      - name: Show OS sanity
        shell: bash
        run: |
          echo "Runner: ${{ matrix.runner }}"
          echo "Target: ${{ matrix.target }}"
          if [ -f /etc/os-release ]; then cat /etc/os-release; fi
          uname -a

      - name: Install Linux build deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          shared-key: 'bundle-${{ matrix.label }}'
          cache-on-failure: true

      - name: Install npm deps
        run: npm ci

      - name: Read release notes
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.gates.outputs.version }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          TAURI_ACTION_VERSION: ${{ env.TAURI_ACTION_VERSION }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/sartracker-web-${VERSION}-beta.md"
          BODY_FILE="$RUNNER_TEMP/release-body.md"
          {
            cat "$NOTES_FILE"
            echo ""
            echo "---"
            echo ""
            echo "## CI Provenance"
            echo ""
            echo "- Build commit: \`${GITHUB_SHA}\`"
            echo "- Run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- Workflow: \`.github/workflows/release.yml\`"
            echo "- Action: \`tauri-apps/tauri-action@${TAURI_ACTION_VERSION}\`"
          } > "$BODY_FILE"
          # Emit a multiline step output using a randomly-generated EOF marker
          # so any line in the markdown body is safe.
          EOF=$(openssl rand -hex 16)
          {
            echo "body<<$EOF"
            cat "$BODY_FILE"
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Release body prepared (length: $(wc -c < "$BODY_FILE") bytes)"

      - name: Build and upload (tauri-action)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.gates.outputs.tag }}
          releaseName: 'SAR Tracker Web ${{ needs.gates.outputs.tag }} (internal beta)'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
          assetNamePattern: 'sartracker-web_[version]_[platform]_[arch][ext]'
          includeUpdaterJson: false
          retryAttempts: 1

      - name: Build only (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          npm run tauri build -- ${{ matrix.args }}
          echo "Dry run: skipping release upload."
          echo "Bundle output:"
          if [ -d src-tauri/target ]; then
            find src-tauri/target -type f \( \
              -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
              -o -name '*-setup.exe' -o -name '*.msi' \
              -o -name '*.dmg' -o -name '*.app.tar.gz' \
            \) -print 2>/dev/null || true
          fi

  launch-smoke-linux:
    name: Launch smoke (Linux AppImage)
    needs: [gates, bundle]
    if: ${{ always() && needs.gates.result == 'success' && (github.event.inputs.smoke_existing_release == 'true' || (github.event.inputs.dry_run != 'true' && needs.bundle.result == 'success')) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Install launch smoke deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0 \
            libayatana-appindicator3-1 \
            librsvg2-2 \
            libfuse2 \
            dbus-x11 \
            gnome-keyring \
            xvfb \
            xdotool \
            imagemagick \
            tesseract-ocr

      - name: Download Linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p smoke-assets smoke-evidence
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern '*linux_amd64.AppImage' \
            --dir smoke-assets
          ls -lh smoke-assets

      - name: Launch AppImage under Xvfb and capture evidence
        shell: bash
        run: |
          set -euo pipefail
          APPIMAGE="$(find smoke-assets -maxdepth 1 -name '*linux_amd64.AppImage' -print -quit)"
          if [ -z "$APPIMAGE" ]; then
            echo "::error::Linux AppImage asset not found."
            exit 1
          fi
          chmod +x "$APPIMAGE"
          export APPIMAGE

          xvfb-run -a --server-args='-screen 0 1280x900x24' dbus-run-session -- bash <<'EOF'
          set -euo pipefail
          export NO_AT_BRIDGE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1

          # The Linux AppImage uses the freedesktop Secret Service backend for
          # stored Traccar credentials. GitHub runners are headless, so provide
          # an unlocked session keyring before launching the app.
          printf '\n' | gnome-keyring-daemon --unlock --components=secrets \
            > smoke-evidence/linux-keyring-env.txt \
            2> smoke-evidence/linux-keyring.log || true
          if [ -s smoke-evidence/linux-keyring-env.txt ]; then
            set -a
            # shellcheck disable=SC1091
            . smoke-evidence/linux-keyring-env.txt
            set +a
          fi

          "$APPIMAGE" > smoke-evidence/linux-appimage.log 2>&1 &
          APP_PID=$!
          echo "$APP_PID" > smoke-evidence/linux-appimage.pid

          WINDOW_FOUND=0
          for _ in $(seq 1 30); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::AppImage process exited before a window appeared."
              cat smoke-evidence/linux-appimage.log || true
              exit 1
            fi
            if xdotool search --name 'SAR Tracker Web' > smoke-evidence/linux-window-ids.txt 2>/dev/null; then
              WINDOW_FOUND=1
              break
            fi
            sleep 1
          done

          if [ "$WINDOW_FOUND" != "1" ]; then
            echo "::error::SAR Tracker Web window did not appear within 30 seconds."
            cat smoke-evidence/linux-appimage.log || true
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi

          sleep 5
          import -window root smoke-evidence/linux-appimage-launch.png
          test -s smoke-evidence/linux-appimage-launch.png
          convert smoke-evidence/linux-appimage-launch.png \
            -crop 420x430+0+100 \
            smoke-evidence/linux-map-region.png
          MAP_REGION_MEAN="$(convert smoke-evidence/linux-map-region.png \
            -colorspace Gray \
            -format '%[fx:mean]' \
            info:)"
          echo "$MAP_REGION_MEAN" > smoke-evidence/linux-map-region-mean.txt
          awk -v mean="$MAP_REGION_MEAN" 'BEGIN { exit !(mean > 0.18) }' || {
            echo "::error::AppImage map region is too dark; basemap tiles may not be rendering."
            echo "Map region grayscale mean: $MAP_REGION_MEAN"
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          }

          tesseract smoke-evidence/linux-appimage-launch.png stdout \
            > smoke-evidence/linux-appimage-ocr.txt \
            2> smoke-evidence/linux-appimage-ocr.log || true
          if grep -E 'Runtime startup failed|Startup fault|Preparing operational runtime' \
            smoke-evidence/linux-appimage-ocr.txt; then
            echo "::error::AppImage opened a runtime boot/fault shell instead of the operational app shell."
            cat smoke-evidence/linux-appimage-ocr.txt
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi

          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true
          EOF

      - name: Upload Linux launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-smoke-linux-${{ needs.gates.outputs.tag }}
          path: smoke-evidence
          if-no-files-found: warn

  launch-smoke-windows:
    name: Launch smoke (Windows NSIS)
    needs: [gates, bundle]
    if: ${{ always() && needs.gates.result == 'success' && (github.event.inputs.smoke_existing_release == 'true' || (github.event.inputs.dry_run != 'true' && needs.bundle.result == 'success')) }}
    runs-on: windows-2022
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Download Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force smoke-assets, smoke-evidence | Out-Null
          gh release download "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --pattern "*windows_x64.exe" --dir smoke-assets
          Get-ChildItem smoke-assets | Format-Table Name, Length

      - name: Silent install, launch, and capture evidence
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem smoke-assets -Filter "*windows_x64.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Windows NSIS installer asset not found."
          }

          $installLog = Join-Path (Resolve-Path smoke-evidence) "windows-install.txt"
          "Installing $($installer.FullName)" | Out-File $installLog
          $install = Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait -PassThru
          "Installer exit code: $($install.ExitCode)" | Out-File $installLog -Append
          if ($install.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($install.ExitCode)."
          }

          $candidateRoots = @(
            (Join-Path $env:LOCALAPPDATA "Programs\sartracker-web")
            (Join-Path $env:LOCALAPPDATA "sartracker-web")
            (Join-Path $env:LOCALAPPDATA "Programs")
          )
          "Candidate roots:" | Out-File $installLog -Append
          $candidateRoots | ForEach-Object { "  $_" | Out-File $installLog -Append }
          $app = $null
          foreach ($root in $candidateRoots) {
            if (Test-Path $root) {
              "Searching $root" | Out-File $installLog -Append
              $app = Get-ChildItem $root -Recurse -Filter "sartracker-web.exe" | Select-Object -First 1
              if ($null -ne $app) { break }
            }
          }
          if ($null -eq $app) {
            throw "Installed sartracker-web.exe was not found under LOCALAPPDATA."
          }
          "Launching $($app.FullName)" | Out-File $installLog -Append

          $process = Start-Process -FilePath $app.FullName -PassThru
          Start-Sleep -Seconds 12
          if ($process.HasExited) {
            throw "sartracker-web.exe exited during launch smoke with code $($process.ExitCode)."
          }

          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $screenshot = Join-Path (Resolve-Path smoke-evidence) "windows-nsis-launch.png"
          $bitmap.Save($screenshot, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose()
          $bitmap.Dispose()
          if ((Get-Item $screenshot).Length -le 0) {
            throw "Windows launch screenshot was empty."
          }

          Stop-Process -Id $process.Id -Force

      - name: Upload Windows launch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-smoke-windows-${{ needs.gates.outputs.tag }}
          path: smoke-evidence
          if-no-files-found: warn

  checksums:
    name: SHA256SUMS sidecar
    needs: [gates, bundle, launch-smoke-linux, launch-smoke-windows]
    if: ${{ always() && github.event.inputs.dry_run != 'true' && github.event.inputs.smoke_existing_release != 'true' && needs.bundle.result == 'success' && needs.launch-smoke-linux.result == 'success' && needs.launch-smoke-windows.result == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p assets
          # Brief settle window in case GitHub's release-asset index is slightly behind.
          sleep 10
          # Fetch every non-checksum asset from the draft release.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' \
            | grep -v '^SHA256SUMS$' \
            | while read -r NAME; do
                echo "Downloading $NAME"
                gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$NAME" --dir assets
              done

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd assets
          shopt -s nullglob
          files=( * )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No release assets found to hash."
            exit 1
          fi
          sha256sum -- "${files[@]}" > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gates.outputs.tag }}
        run: |
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber assets/SHA256SUMS

  summary:
    name: Summary
    needs: [gates, bundle, launch-smoke-linux, launch-smoke-windows, checksums]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Build summary
        env:
          TAG: ${{ needs.gates.outputs.tag }}
          GATES_RESULT: ${{ needs.gates.result }}
          BUNDLE_RESULT: ${{ needs.bundle.result }}
          CHECKSUMS_RESULT: ${{ needs.checksums.result }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          {
            echo "# Release run summary"
            echo ""
            echo "- Tag: \`${TAG:-(unresolved)}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            echo ""
            echo "## Job results"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| gates | ${GATES_RESULT} |"
            echo "| bundle | ${BUNDLE_RESULT} |"
            echo "| checksums | ${CHECKSUMS_RESULT} |"
            echo ""
            echo "## Next step"
            echo ""
            if [ "$BUNDLE_RESULT" = "success" ] && [ "$DRY_RUN" != "true" ]; then
              echo "The release for \`${TAG}\` is in **DRAFT**. Review the assets and the body, then publish with:"
              echo ""
              echo '```bash'
              echo "gh release view ${TAG} --repo ${GITHUB_REPOSITORY}"
              echo "gh release edit ${TAG} --repo ${GITHUB_REPOSITORY} --draft=false"
              echo '```'
            else
              echo "Bundle did not complete cleanly. Investigate the failed jobs above before publishing."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
